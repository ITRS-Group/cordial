#
# Servicenow Geneos Integration v2 - proxy configuration
#
# The proxy acts as a single point of contact to the Servicenow
# instance. The proxy supports two endpoints, one to GET existing
# incidents for display as a Dataview and the other for the submission
# of incidents, either new or updates.
#

server:
  # answer requests on a concatenation of `proxy.listen`, `proxy.path`
  # and table name, where the table is looked up against the "tables"
  # section below
  listen: localhost:3000
  path: /ims-gateway/api/v1
  tls:
    enabled: false
    # PEM formatted certificate, either a multiline string or an
    # expandable format reference to an external file
    certificate: ${file:/path/to/certificate.pem}
    # or
    # certificate: |
    #   -----BEGIN CERTIFICATE-----
    #   ...

    # PEM formatted unencrypted private key, either a multiline string
    # or an expandable format reference to an external file
    private-key: ${file:/path/to/private.key}

  # add support later for basic, oauth, cert etc. token only for now
  authentication:
    # the `token` can be any string as long as it is the same on both
    # proxy and client - the client being either the incident poster or a
    # GET requests for all incidents. To protect the plain text, if
    # required, you can use `geneos aes password` to create an encoded
    # strings that replies on the security of the key file being read-only
    # to the user. This also allows the configuration file to be shared
    # without sharing the plaintext of the key.
    token: testing

sdp:
  # list of datacentres to use for authentication and API requests. The
  # datacentre to use is selected by the `datacentre` parameter below.
  #
  # for an up-to-date list see:
  #
  # https://www.zoho.com/analytics/api/v2/api-specification.html
  datacentres:
    us:
        auth: https://accounts.zoho.com
        api: https://sdpondemand.manageengine.com
    eu:
        auth: https://accounts.zoho.eu
        api: https://sdpondemand.manageengine.eu
    in:
        auth: https://accounts.zoho.in
        api: https://sdpondemand.manageengine.in
    cn:
        auth: https://accounts.zoho.com.cn
        api: https://servicedeskplus.cn
    au:
        auth: https://accounts.zoho.com.au
        api: https://servicedeskplus.net.au
    jp:
        auth: https://accounts.zoho.jp
        api: https://servicedeskplus.jp
    ca:
        auth: https://accounts.zohocloud.ca
        api: https://servicedeskplus.ca
    uk:
        auth: https://accounts.zoho.uk
        api: https://servicedeskplus.uk
    sa:
        auth: https://accounts.zoho.sa
        api: https://servicedeskplus.sa

  # which datacentre to use for authentication and API requests,
  # selected from the list above
  datacentre: eu

  # the `portal` is the name of the portal to use within the datacentre,
  # this is typically the same as the instance name shown in the URL
  # when you log in to the web interface, e.g. `mycompany` if your URL
  # is `https://mycompany.sdp.com`.
  portal: mycompany

  client-id: ${enc:~/.config/geneos/keyfile.aes:+encs+FEC17073E98847711F56E0A04AC4CF089F6FF28307AB836ED4F359A1FCD971E076E2B457C7FECA34A9EC8B5DC3A7890D}
  client-secret: ${enc:~/.config/geneos/keyfile.aes:+encs+E0411869453CCB6192723624A3D277C1818AADC8289044B2BD2C07E8328F830F8E50BF71378CD271AB4DDBF59ABE49EE}

  requests:
    # the names of the user defined field used to store the
    # correlation-ID.
    #
    # It is of the format `udf_fields.txt_FIELDNAME` where `FIELDNAME`
    # is the name of the user defined field in ServiceDesk Plus. This is
    # used to correlate incidents created or updated by this integration
    # with the incoming requests, so that updates to existing incidents
    # can be made instead of creating new ones.
    #
    # We suggest either `geneos_id` or `correlation_id`
    correlation_id: udf_fields.txt_correlation_id

    # search for an existing incident request
    #
    # the YAML from `list_info` is "expanded" and converted to JSON and
    # then passed to the SDP API as the body of the search request. This
    # allows you to refer to other configuration values in the proxy
    # configuration file as `${config:sdp.parameter}`, as well as
    # dynamically set parameters available such as `${correlation_id}`.
    #
    # The available parameters are defined here:
    #
    # https://www.manageengine.com/products/service-desk/sdpod-v3-api/getting-started/input-data.html
    # https://www.manageengine.com/products/service-desk/sdpod-v3-api/getting-started/search-criteria.html
    search:
      list_info:
        search_criteria:
          - field: ${requests.correlation_id}
            condition: is
            value: ${correlation_id}
          - field: status.name
            condition: is
            value: Open
            logical_operator: and
        fields_required: [ id, status.name ]

    # optional transformation to apply to the request before using it
    # for updates or creates. The transformation is applied after the
    # search phase and any existing request has been found, but before
    # the update or create is performed. This allows you to modify the
    # request based on the current state of the incident in ServiceDesk
    # Plus.
    #
    # The transformation supports the following steps, which are applied in
    # the order given below:
    transform:
      # 1. `defaults` - set default values for fields if they have not
      #    been set previously/elsewhere. This is applied before any
      #    other steps, so the default values can be overridden by any
      #    other step below.
      defaults:

      # 2. `remove` - remove the fields listed from those currently set.
      #    Note that all fields with a double-underscore prefix will be
      #    removed anyway, after all other processing, before the final
      #    set is sent to ServiceDesk Plus.
      remove:

      # 3. `rename` - rename each fields used as a key to the value
      #    given. Note that all fields with a prefix of `__sdp_` will be
      #    automatically renamed to remove the prefix at the start of
      #    the `rename` phase, before any given below.
      #
      #    Fields prefixed with `__sdp_` are always renamed to remove
      #    the prefix at the start of this stage, and configured
      #    renaming is applied after that.
      rename:

      # 4. `exclude` - if defined and non-zero in length, a list of
      #    fields names that will be excluded from the request when it
      #    is sent to ServiceDesk Plus.
      exclude:

      # 5. `include` - if defined and non-zero in length, a list of
      #    fields names that will be included in the request when it is
      #    sent to ServiceDesk Plus.
      include:

      # 6. `must-include` - if defined and non-zero in length, a list of
      #    fields names that must be included in the request when it is
      #    sent to ServiceDesk Plus.
      must-include:

    # similar to search, above, this is used to get a list of requests from SDP
    get:
      list_info:
        row_count: 100
        search_criteria:
          - field: status.name
            condition: is
            value: Open
        fields_required: [ impact_details, udf_fields, subject, requester, template, status, request_type, has_notes ]

    # list of columns for `get` above
    columns:
      - id
      - subject
      - status.name
      - template.name
      - ${config:requests.correlation_id}

    # Create a new request using these fields. The YAML from `request`
    # (inclusive) is "expanded" and converted to JSON and then passed to
    # the SDP API as the body of the create request. This allows you to
    # refer to other configuration values in the proxy configuration
    # file as `${config:sdp.parameter}`
    create:
      request:
        request_type:
          name: Incident
        template:
          name: Default Request
        subject: ${__incident_subject}
        description: ${__incident_body_html}
        category:
          name: ${__itrs_category}
        subcategory:
          name: ${__itrs_subcategory}
        item:
          name: ${__itrs_entity}
        udf_fields:
          txt_correlation_id: ${correlation_id}

    # Update, similar to `create` above, is used to update an existing
    # request, the YAML from `edit_request.request` (inclusive) is
    # "expanded" and converted to JSON and then passed to the SDP API as
    # the body of the update request. The YAML from
    # `add_note.request_note` (inclusive) is "expanded" and converted to
    # JSON and then passed to the SDP API as the body of the add note
    # request.
    #
    # You must include `request` in both sections below
    update:
      edit_request:
        request:
          status:
            name: ${__sdp_status}
      add_note:
        request_note:
          description: ${__incident_body_html}

  # enable tracing of requests and responses.
  trace: false

snow:
  url: https://dev288827.service-now.com/
  path: /api/now/v2/table
  username: admin
  password: ${enc:~/.config/geneos/keyfile.aes:+encs+6E5DCBD45CAC3C435D7B9A04EF790F19}
  # client-id: ${SERVICENOW_CLIENTID}
  # client-secret: ${SERVICENOW_CLIENTSECRET}
  
  # the `trace` option is used to enable additional logging of the
  # requests and responses to/from ServiceNow. This is useful for
  # debugging issues with the API, but should be disabled in production
  # environments to avoid logging sensitive information.
  trace: false

  tables:
    # multiple tables are supported through the client side `--table`
    # option which results in a different endpoint used for each table.
    # The named tables below are selected by the last part of the
    # endpoint URL, e.g. `/snow/api/v2/incident`
    #
    # if a table configuration does not exist an error is returned
    - name: incident
      # `search` is the ServiceNow filter query used to lookup existing
      # incidents
      #
      # For details of what is permitted, see:
      #
      # <https://www.servicenow.com/docs/bundle/xanadu-platform-user-interface/page/use/using-lists/concept/c_EncodedQueryStrings.html>
      # <https://www.servicenow.com/docs/bundle/xanadu-platform-user-interface/page/use/common-ui-elements/reference/r_OpAvailableFiltersQueries.html>
      #
      # In addition to referring to other configuration values in the
      # proxy configuration file as `${config:snow.parameter}`,
      # other dynamically set parameters available are:
      #
      #   * ${cmdb_ci}
      #   * ${correlation_id}
      #
      # For example, to exclude "Resolved" incidents from being found
      # and updated, instead requiring a new incident to be created, use
      # this:
      #
      #     search: "state!=6^active=true^cmdb_ci=${cmdb_ci}^correlation_id=${correlation_id}^ORDERBYDESCnumber"
      #
      # The default search, if not otherwise defined, is:
      search: "active=true^cmdb_ci=${cmdb_ci}^correlation_id=${correlation_id}^ORDERBYDESCnumber"

      response:
        created: "${_timestamp} Incident ${_number} Created - State ${state} Impact ${impact} Urgency ${urgency} - '${_subject}' from ${_gateway}"
        updated: "${_timestamp} Incident ${_number} Updated - State ${state} Impact ${impact} Urgency ${urgency} - '${_subject}' from ${_gateway}"
        failed: "${_timestamp} Failed to create or update incident from ${_gateway} - ${_error}"
        query: "${_timestamp} Query `${_query}` for table ${_table} returned ${_count} results"

      defaults:
        _cmdb_ci_default: 03a9e40d3790200044e0bfc8bcbe5d6c
        assignment_group: group1
        incident_type: event
        impact: 3
        urgency: 3
        category: hardware
        contact_type: email
        caller_id: "david.miller@example.com"

     

      # `current-state` - each key is the numeric value of the current
      # state of the incident before any changes are made. state 0 is a
      # special value meaning that the incident could not be found and
      # will be created, instead of updated.
      current-state:
        #
        # The transformation for each state supports the following
        # steps, which are applied in the order given below:
        #
        # 1. `defaults` - set default values for fields if they have not
        #    been set previously/elsewhere. This is applied before any
        #    other steps, so the default values can be overridden by any
        #    other step below.
        #
        # 2. `remove` - remove the fields listed from those currently
        #    set. Note that all fields with a double-underscore prefix
        #    will be removed anyway, after all other processing, before
        #    the final set is sent to ServiceNow.
        #
        # 3. `rename` - rename each fields used as a key to the value
        #    given. Note that all fields with a prefix of `__snow_` will
        #    be automatically renamed to remove the prefix at the start
        #    of the `rename` phase, before any given below.
        #
        #    Fields prefixed with `__snow_` are always renamed to remove
        #    the prefix at the start of this stage, and configured
        #    renaming is applied after that.
        #
        # 4. `exclude` - if defined and non-zero in length, a list of
        #    fields names that will be excluded from the request when it
        #    is sent to ServiceNow.
        #
        # 5. `include` - if defined and non-zero in length, a list of
        #    fields names that will be included in the request when it
        #    is sent to ServiceNow.
        #
        # 6. `must-include` - if defined and non-zero in length, a list
        #    of fields names that must be included in the request when
        #    it is sent to ServiceNow.

        # current state 0 - incident doesn't exist (or could not be
        # found), incident will be created
        0:
          # default values if not set previously/elsewhere
          defaults:
            state: 1
          remove: [ watch_list ]
          rename:
            __incident_body_text: description
            __incident_subject: short_description
          must-include: [ short_description, description ]

        # current state 1 - is a new incident
        1:
          defaults:
            state: 2
          remove: [ short_description ]
          rename:
            __incident_body_text: work_notes
          must-include: [ work_notes ]

        # current state 2 - updated
        2:
          defaults:
            state: 2
          remove: [ short_description ]
          rename:
            __incident_body_text: work_notes

        # current state 6 - resolved
        6: # resolve
          defaults:
            state: 1
          remove: [ short_description ]
          rename:
            __incident_subject: short_description
            __incident_body_text: work_notes

      # the query endpoint is configured below
      query:
        enabled: true
        # fields are returned in the order below. to ensure that Geneos
        # row-names are unique make sure that the first column is a
        # primary key, as below
        fields: [ number, sys_id, cmdb_ci.name, short_description, description, correlation_id, opened_by, state ]

